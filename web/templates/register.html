{{define "title"}}Sign Up{{end}}

{{define "content"}}
<div class="auth-page-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-tag">JOIN US</span>
      <h1 class="auth-title">Create an Account</h1>
    </div>

    {{if .Error}}
    <div class="auth-error-alert">
      <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>{{.Error}}</span>
    </div>
    {{end}}

    <form class="auth-form" action="/register" method="POST">
      <div class="input-field-group">
        <label for="reg-username" class="editorial-label">Username *</label>
        <input type="text" id="reg-username" name="username" class="editorial-input" required autocomplete="username">
      </div>

      <div class="input-field-group">
        <label for="reg-email" class="editorial-label">Email Address *</label>
        <input type="email" id="reg-email" name="email" class="editorial-input" required autocomplete="email">
      </div>

      <div class="input-field-group">
        <label for="reg-password" class="editorial-label">Password *</label>
        <div class="password-input-container">
          <input type="password" id="reg-password" name="password" class="editorial-input password-input" required autocomplete="new-password">
          <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('reg-password', this)" aria-label="Toggle password visibility">
            <!-- Closed Eye (Default) -->
            <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
            <!-- Open Eye -->
            <svg class="eye-icon eye-open hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <p class="input-guideline-text">Password must contain at least 8 characters, including uppercase, lowercase, and a special character.</p>
      </div>

      <div class="checkbox-container">
        <input type="checkbox" id="terms-agree" name="terms" required>
        <label for="terms-agree" class="checkbox-label">I agree to the <a href="/terms" class="auth-inline-link">Terms and Conditions</a> *</label>
      </div>

      <button type="submit" class="btn-green-submit auth-submit-btn">Sign Up</button>

      <p class="auth-switch-text">
        Already have an account? <a href="/login" class="auth-inline-link">Log In</a>
      </p>
    </form>
  </div>
</div>
{{end}}
