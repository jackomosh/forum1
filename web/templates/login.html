{{define "title"}}Login{{end}}

{{define "content"}}
<div class="auth-page-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-tag">WELCOME BACK</span>
      <h1 class="auth-title">Log In to Dev Forum</h1>
    </div>

    {{if .Error}}
    <div class="auth-error-alert">
      <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>{{.Error}}</span>
    </div>
    {{end}}

    <form class="auth-form" action="/login" method="POST">
      <div class="input-field-group">
        <label for="login-username" class="editorial-label">Username or Email *</label>
        <input type="text" id="login-username" name="username" class="editorial-input" required autocomplete="username">
      </div>

      <div class="input-field-group">
  <div class="password-label-wrapper">
    <label for="login-password" class="editorial-label">Password *</label>
    <a href="/forgot-password" class="forgot-password-link">Forgot password?</a>
  </div>
  
  <!-- Relative container spanning full width -->
  <div class="password-input-container">
    <input type="password" id="login-password" name="password" class="editorial-input password-input" required autocomplete="current-password">
    <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('login-password', this)" aria-label="Toggle password visibility">
      <!-- Closed Eye -->
      <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      </svg>
      <!-- Open Eye -->
      <svg class="eye-icon eye-open hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
    </button>
  </div>
</div>

      <button type="submit" class="btn-green-submit auth-submit-btn">Log In</button>

      <p class="auth-switch-text">
        Don't have an account? <a href="/register" class="auth-inline-link">Sign Up</a>
      </p>
    </form>
  </div>
</div>
{{end}}
