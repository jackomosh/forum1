{{define "title"}}Reset Password{{end}}

{{define "content"}}
<div class="auth-page-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-tag">RESET PASSWORD</span>
      <h1 class="auth-title">Forgot Password?</h1>
    </div>

    {{if .Error}}
    <div class="auth-error-alert">
      <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>{{.Error}}</span>
    </div>
    {{end}}

    <form class="auth-form" action="/forgot-password" method="POST">
      <p class="auth-helper-instruction">
        Enter your email address below and we'll send you a link to reset your password.
      </p>

      <div class="input-field-group">
        <label for="forgot-email" class="editorial-label">Email Address *</label>
        <input type="email" id="forgot-email" name="email" class="editorial-input" required autocomplete="email">
      </div>

      <button type="submit" class="btn-green-submit auth-submit-btn">Send Reset Link</button>

      <p class="auth-switch-text">
        Remembered your password? <a href="/login" class="auth-inline-link">Back to Log In</a>
      </p>
    </form>
  </div>
</div>
{{end}}
